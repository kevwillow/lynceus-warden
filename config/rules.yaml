# Lynceus detection rules.
# Each rule is evaluated against every supported device observation. See README
# for the schema; rule_type is one of watchlist_mac, watchlist_oui,
# watchlist_ssid, watchlist_mac_range, ble_uuid, or new_non_randomized_device.
rules:
  # Hak5 WiFi Pineapple uses a recognizable OUI prefix — flag it on sight.
  - name: hak5_pineapple_oui
    rule_type: watchlist_oui
    severity: high
    patterns: ["00:13:37"]
    description: Hak5 WiFi Pineapple OUI prefix

  # Specific MACs known to be hostile (replace with your own intel).
  - name: known_bad_mac
    rule_type: watchlist_mac
    severity: high
    patterns: ["DE:AD:BE:EF:00:01"]

  # SSIDs commonly used for evil-twin / captive-portal attacks.
  - name: rogue_ssids
    rule_type: watchlist_ssid
    severity: med
    patterns: ["FreeAirportWiFi", "attwifi-rogue"]

  # Catch any first-time-seen device that is NOT using a randomized MAC —
  # i.e. a device that didn't bother hiding its real OUI.
  - name: new_device_alert
    rule_type: new_non_randomized_device
    severity: low

  # Example of a rule kept in the file but switched off via `enabled: false`.
  - name: temporarily_disabled
    rule_type: watchlist_mac
    severity: low
    patterns: ["11:22:33:44:55:66"]
    enabled: false

  # watchlist_mac_range delegates matching to the watchlist DB. Patterns MUST
  # be empty — the rule fires when an observed MAC falls inside any imported
  # mac_range row's /28 or /36 prefix (populated by lynceus-import-argus).
  # Severity is sourced from the matched DB row, NOT from the `severity`
  # field below (which is ignored for this rule_type). For Argus-imported
  # rows the per-row severity comes from device_category → severity defaults
  # in import_argus.py; for the 17,786 IEEE-registry rows currently shipped,
  # device_category is "unknown" which maps to "low" by default.
  #
  # Uncomment to enable.
  #
  # - name: argus_mac_range
  #   rule_type: watchlist_mac_range
  #   severity: low  # ignored — actual severity comes from the matched row
  #   patterns: []
  #   description: "Argus mac_range corpus — IEEE registry sub-allocations"

  # ---- DB-delegation entries for the equality-shaped watchlist types ----
  #
  # The four entries below extend the empty-patterns-delegates-to-DB
  # semantic from watchlist_mac_range to watchlist_mac, watchlist_oui,
  # watchlist_ssid, and ble_uuid. Each enables alert-firing for every
  # matching row of that pattern_type currently in the watchlist DB —
  # the 63 rows shipped via the bundled default_watchlist.csv plus
  # whatever lynceus-import-argus has populated. See the CHANGELOG
  # entry for 0.4.0-rc4 ("watchlist delegation extension") and the
  # Part 2 entry it builds on for the architectural background.
  #
  # Same contract as watchlist_mac_range: patterns: [] = delegate to
  # the imported DB rows; the `severity` field below is IGNORED for
  # the delegation case (the emitted alert's severity comes from the
  # matched DB row's severity column, populated by the importer from
  # device_category via DEFAULT_CATEGORY_SEVERITIES in import_argus.py
  # — alpr / imsi_catcher / hacking_tool default to "high",
  # body_cam / drone / gunshot_detect / in_vehicle_router to "med",
  # and "unknown" / unspecified to "low"). Default is OFF; uncomment
  # to enable.
  #
  # Backward compat: any pre-existing entry of these types with a
  # non-empty `patterns:` list keeps its original in-memory match
  # semantic (severity sourced from the rule). The empty-patterns
  # idiom only activates the DB delegation path for new entries —
  # existing operator deployments see zero behavioral change unless
  # they deliberately uncomment one of the entries below.
  #
  # - name: argus_mac
  #   rule_type: watchlist_mac
  #   severity: low  # ignored — actual severity comes from the matched row
  #   patterns: []
  #   description: "Argus + bundled exact-MAC watchlist"
  #
  # - name: argus_oui
  #   rule_type: watchlist_oui
  #   severity: low  # ignored — actual severity comes from the matched row
  #   patterns: []
  #   description: "Argus + bundled OUI watchlist"
  #
  # - name: argus_ssid
  #   rule_type: watchlist_ssid
  #   severity: low  # ignored — actual severity comes from the matched row
  #   patterns: []
  #   description: "Argus + bundled SSID watchlist"
  #
  # - name: argus_ble_uuid
  #   rule_type: ble_uuid
  #   severity: low  # ignored — actual severity comes from the matched row
  #   patterns: []
  #   description: "Argus + bundled BLE service-UUID watchlist"
