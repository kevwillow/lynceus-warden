# Lynceus configuration sample.
# Copy this file to lynceus.yaml and customize. All fields have sensible
# defaults — only override what you actually need.

# --- Kismet source ---

# URL of the Kismet REST API. Override per deployment.
kismet_url: http://localhost:2501

# Kismet API key (cookie). Typically set in production deployments where
# Kismet is auth-protected. Leave null for unauthenticated local use.
kismet_api_key: null

# Optional: path to a JSON fixture matching the Kismet device-list shape.
# When set, Lynceus uses FakeKismetClient and never makes HTTP calls — useful
# for offline development and tests. Leave commented out in production.
# kismet_fixture_path: tests/fixtures/kismet_devices.json

# --- Storage ---

# Path to the SQLite database file. Typically overridden to a stable
# location (e.g. /var/lib/lynceus/lynceus.db) on the Pi.
db_path: lynceus.db

# --- Location ---
# Identifier and human label for sightings recorded by this instance.
# Typically overridden to identify the physical install (e.g. 'home', 'office').
location_id: default
location_label: Default Location

# --- Polling ---

# Seconds between Kismet polls. Minimum 5; values below are rejected.
poll_interval_seconds: 60

# --- Logging ---

# One of DEBUG, INFO, WARNING, ERROR.
log_level: INFO

# --- Detection rules and allowlist ---

# Path to the rules YAML (see config/rules.yaml). When unset, no rules
# are loaded and no alerts are generated.
# rules_path: config/rules.yaml

# Path to the allowlist YAML (see config/allowlist.yaml). Devices matched
# here are exempted from alerting. When unset, nothing is allowlisted.
# allowlist_path: config/allowlist.yaml

# Suppress repeated alerts for the same (rule, mac) within this many seconds.
# Set to 0 to disable dedup (every hit becomes an alert).
alert_dedup_window_seconds: 3600

# --- Notifications ---

# ntfy notification settings (optional — leave unset to disable)
# ntfy_url: https://ntfy.sh         # Or your self-hosted instance
# ntfy_topic: my-lynceus-alerts       # Required if ntfy_url is set
# ntfy_auth_token: xxx              # Optional bearer token for protected topics

# --- Web UI (lynceus-ui) ---

# Host interface the UI binds to. Default 127.0.0.1 (loopback only). To
# expose the UI to other machines on the LAN, change this AND set
# ui_allow_remote: true (Lynceus has no auth layer, so binding non-loopback
# without that flag is a footgun and is rejected at config load).
ui_bind_host: 127.0.0.1

# TCP port the UI listens on. Must be in [1, 65535].
ui_bind_port: 8765

# Permit binding to a non-loopback address. Leave false on a single-Pi
# install. Required true for any setup where a separate machine will
# fetch the UI; only set true when you have placed lynceus behind your
# own auth layer (e.g. a reverse proxy with HTTP basic auth or VPN).
ui_allow_remote: false

# --- Multi-source / multi-adapter ---

# Inclusive filter on Kismet source (adapter) names. When set, only
# observations seen by at least one of the listed sources are processed;
# all others are silently dropped (DEBUG-logged). Source names are matched
# exactly against the "kismet.common.seenby.source" field reported by Kismet.
# Leave unset to accept observations from every source.
# kismet_sources:
#   - alfa-2.4ghz
#   - builtin-bt

# Per-source location override. Maps Kismet source names to location_id
# values; sightings observed by a matching source are recorded under that
# location_id (rather than the global location_id above). Sources not
# present here fall back to location_id. Source name matching is exact.
# kismet_source_locations:
#   alfa-2.4ghz: wifi-corner
#   builtin-bt: bt-corner

# Drop observations weaker than this RSSI threshold (in dBm; values must be
# in [-120, 0]). Observations with no RSSI report (rssi=None) are kept
# regardless. Leave unset to disable RSSI filtering.
# min_rssi: -85

# HTTP timeout (seconds) for all Kismet REST calls. Must be > 0 and <= 120.
kismet_timeout_seconds: 10.0

# Probe Kismet's /system/status.json once at poller startup; on failure,
# Poller.__init__ raises and the daemon exits immediately. Set to false
# to skip the check (e.g. when starting lynceus before kismet is ready).
kismet_health_check_on_startup: true

# --- Tier 1 passive metadata capture ---
#
# Lynceus is a tool to *detect* surveillance, not to become surveillance.
# These toggles control whether two pieces of broadcast metadata get
# stored on the device row. Both columns are NULL when their toggle is
# off, and the poller does not even read the underlying Kismet field —
# opt-out means the data never enters the lynceus process.
capture:
  # Wi-Fi clients leak their probe-request SSID lists (e.g. SSIDs of
  # networks they have previously connected to). Capturing this list is
  # useful for triage — you can spot a device probing a coffee-shop SSID
  # in your living room — but it is also surveillance-grade telemetry
  # about other people's devices. Default OFF; set true only if you
  # accept the privacy posture.
  probe_ssids: false
  # BLE devices broadcast a friendly name in the GAP advertisement
  # (e.g. "Kev's AirPods", "Tile_a1b2"). This is broadcast with intent
  # and is more useful than harmful for triage. Default ON.
  ble_friendly_names: true
