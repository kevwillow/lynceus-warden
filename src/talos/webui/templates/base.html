<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}talos{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/pico.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/talos.css') }}">
    <script defer src="{{ url_for('static', path='/htmx.min.js') }}"></script>
    <script defer src="/static/talos.js"></script>
  </head>
  <body>
    <main class="container-fluid">
      <nav><strong>talos</strong> <small>v{{ version }}</small> &mdash; read-only dashboard</nav>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
