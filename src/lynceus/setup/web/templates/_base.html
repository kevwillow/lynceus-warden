<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}lynceus-setup{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/pico.min.css') }}">
    <style>
      /* Bundled Pico is the classless build, so `.container` is not
         defined; `body>main` provides loose centering with the
         framework's default ~1200px max-width which is too wide for a
         single-column form. Pin an explicit narrower max-width on
         `.container` AND override body>main's wider responsive caps
         (specificity: 0,1,0 vs 0,0,2 — .container wins by selector
         weight, but make the intent explicit). Centered via auto
         margins with a small viewport-side gutter so the card edge
         never butts against the browser chrome on tablets. */
      main.container { max-width: 720px; margin-left: auto; margin-right: auto; padding-left: 1rem; padding-right: 1rem; }
      .wizard-step-indicator { font-size: 0.85em; color: var(--muted-color); margin-bottom: 0.5em; }
      .wizard-step-indicator ol { list-style: decimal inside; padding: 0; margin: 0.2em 0; }
      .wizard-step-indicator ol li { display: inline; margin-right: 0.6em; }
      .wizard-step-indicator ol li.current { font-weight: bold; color: var(--color); }
      /* Section divider under each step's H1 so the prose intro and
         the form interactives below have a visible boundary. */
      main.container > h1 { border-bottom: 1px solid var(--pico-muted-border-color, #cfd8dc); padding-bottom: 0.4em; margin-bottom: 0.8em; }
      /* Card-style background on the step's <form> so the input row
         visually separates from the prose intro above. Pico classless
         doesn't style <form> with a background — without this the
         form flows directly off the paragraph and the page reads as
         a wall of text. */
      main.container > form { background: var(--pico-card-background-color, #f4f6f8); border: 1px solid var(--pico-muted-border-color, #cfd8dc); border-radius: var(--pico-border-radius, 0.25rem); padding: 1.25em 1.5em; margin-top: 1em; }
      /* Fieldsets inside the form get a subtle inset so a multi-row
         section (Kismet sanity panel, BLE friendly-name list) reads
         as a grouped block rather than free-floating inputs. */
      main.container > form fieldset { background: var(--pico-background-color, #ffffff); border: 1px solid var(--pico-muted-border-color, #e0e6ea); border-radius: var(--pico-border-radius, 0.25rem); padding: 0.75em 1em; margin-bottom: 1em; }
      /* Top-nav chrome. Pico's classless build leaves a bare <nav>
         with only inherited text styling, so the "lynceus-setup vX.Y.Z"
         strip rendered as floating letters above the form with no
         visual boundary — operators reported it reading "broken" /
         "unstyled". Pin a card-style background + bottom border so the
         nav reads as a deliberate app header, and lay it out as a
         baseline-aligned flex row so the brand and the version sit on
         the same line with the same baseline. */
      .wizard-topnav { display: flex; align-items: baseline; gap: 0.6em; background: var(--pico-card-background-color, #f4f6f8); border-bottom: 1px solid var(--pico-muted-border-color, #cfd8dc); padding: 0.6em 0.9em; margin-bottom: 1em; border-radius: var(--pico-border-radius, 0.25rem) var(--pico-border-radius, 0.25rem) 0 0; }
      .wizard-footer { margin-top: 2em; display: flex; justify-content: space-between; gap: 1em; }
      /* Pico styles <a role="button"> and <button> with the same base
         rules but they end up visibly different sizes in wizard-footer:
         Previous (anchor) and Next/Apply/Review (real button) carry
         different text widths AND different default vertical paddings
         (Pico's <a role="button"> inherits anchor line-height; <button>
         uses the UA-default form-control line-height), so without an
         explicit pin on BOTH axes the row looks uneven. Pin min-width,
         horizontal AND vertical padding, line-height, and box-sizing
         so both element types resolve to the same rendered box model
         regardless of label or browser default. Step 3 renders two
         <button> elements (Cancel + Continue, both real form submits
         with different action= values) instead of the anchor-then-
         button pair every other step uses; the rule covers that case
         because .wizard-footer button matches both buttons identically. */
      .wizard-footer a[role="button"],
      .wizard-footer button { box-sizing: border-box; min-width: 9em; padding: 0.6em 1.5em; line-height: 1.25; text-align: center; }
      .wizard-error { color: var(--del-color); margin-bottom: 0.5em; }
    </style>
  </head>
  <body>
    <main class="container">
      <nav class="wizard-topnav">
        <strong>lynceus-setup</strong>
        <small>v{{ version }} &mdash; first-run configuration wizard</small>
      </nav>
      {% block step_indicator %}{% endblock %}
      {% block content %}{% endblock %}
      <footer class="wizard-footer">
        {% block footer %}
          <small><a href="{{ url_with_token('/cancel') }}">Cancel wizard</a></small>
        {% endblock %}
      </footer>
    </main>
  </body>
</html>
